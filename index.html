<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>WWIクイズ完全版</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#dbeafe,#fce7f3);
}

h1{margin-top:30px;}

.menuBtn{
  display:block;
  margin:15px auto;
  padding:22px;
  width:360px;
  font-size:22px;
  border:none;
  border-radius:25px;
  color:white;
  cursor:pointer;
}

.sec1{background:#60a5fa;}
.sec2{background:#34d399;}
.sec3{background:#f472b6;}
.sec4{background:#fbbf24;}
.sec5{background:#a78bfa;}

#quizBox{display:none;margin-top:30px;}

.choice{
  display:block;
  margin:10px auto;
  padding:14px;
  width:330px;
  font-size:18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:white;
}

.correct{background:#86efac !important;}
.wrong{background:#fca5a5 !important;}

#timer{font-size:20px;color:#ef4444;margin-bottom:10px;}

#feedback{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.resultBtn{
  margin:10px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#818cf8;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🌍 第一次世界大戦クイズ 🌸</h1>

<div id="menu">
  <button class="menuBtn sec1" onclick="startSection(1)">セクション1（1〜6）</button>
  <button class="menuBtn sec2" onclick="startSection(2)">セクション2（7〜12）</button>
  <button class="menuBtn sec3" onclick="startSection(3)">セクション3（13〜18）</button>
  <button class="menuBtn sec4" onclick="startSection(4)">セクション4（19〜24）</button>
  <button class="menuBtn sec5" onclick="startSection(5)">セクション5（25〜29）</button>
</div>

<div id="quizBox">
  <div id="timer"></div>
  <h2 id="question"></h2>
  <div id="choices"></div>
  <div id="feedback"></div>
</div>

<div id="result"></div>

<script>

const quizData = [

/* セクション1（1〜6） */
{sec:1,q:"1914年8月に日本が宣戦布告した国は？",choices:["ドイツ","オーストリア","イタリア","ロシア"],a:"ドイツ"},
{sec:1,q:"1914年10月に日本が占領した島は？",choices:["ドイツ領南洋諸島","台湾","樺太","沖縄"],a:"ドイツ領南洋諸島"},
{sec:1,q:"1914年11月に日本が占領した島(都市)は？",choices:["青島","上海","南京","天津"],a:"青島"},
{sec:1,q:"対華二十一ヵ条の要求を突き付けられた人物は？",choices:["袁世凱","孫文","蒋介石","段祺瑞"],a:"袁世凱"},
{sec:1,q:"この要求で割譲できなくなった省は？",choices:["福建省","広東省","山東省","河北省"],a:"福建省"},
{sec:1,q:"要求をのんだ5月9日の記念日は？",choices:["国恥記念日","建国記念日","独立記念日","革命記念日"],a:"国恥記念日"},

/* セクション2（7〜12） */
{sec:2,q:"袁世凱の死後の中心人物は？",choices:["段祺瑞","孫文","蒋介石","黎元洪"],a:"段祺瑞"},
{sec:2,q:"大隈重信の後の首相は？",choices:["寺内正毅","原敬","伊藤博文","桂太郎"],a:"寺内正毅"},
{sec:2,q:"西原亀三が中心の政治を何という？",choices:["西原借款","満州事変","五・四運動","日英同盟"],a:"西原借款"},
{sec:2,q:"ロシア革命の中心人物は？",choices:["レーニン","スターリン","トロツキー","ケレンスキー"],a:"レーニン"},
{sec:2,q:"史上初の社会主義国家は？",choices:["ソ連","ロシア帝国","中華民国","ドイツ帝国"],a:"ソ連"},
{sec:2,q:"ソ連に軍を派遣した出来事は？",choices:["シベリア出兵","日露戦争","満州事変","北伐"],a:"シベリア出兵"},

/* セクション3（13〜18） */
{sec:3,q:"シベリア出兵で救出対象となった旧連邦国家は？",choices:["チェコスロヴァキア","ポーランド","ハンガリー","ブルガリア"],a:"チェコスロヴァキア"},
{sec:3,q:"米価格高騰事件の名前は？",choices:["米騒動","大正デモクラシー","五・四運動","三・一独立運動"],a:"米騒動"},
{sec:3,q:"外国に借金をしている国を何という？",choices:["債務国","債権国","同盟国","中立国"],a:"債務国"},
{sec:3,q:"外国に資金を貸している国何という？",choices:["債権国","債務国","植民地","宗主国"],a:"債権国"},
{sec:3,q:"造船で成功した人々を何という？",choices:["船成金","財閥","華族","実業家"],a:"船成金"},
{sec:3,q:"有名な船成金は？",choices:["内田信也","岩崎弥太郎","渋沢栄一","後藤新平"],a:"内田信也"},

/* セクション4（19〜24） */
{sec:4,q:"十四か条の平和原則を唱えた大統領は？",choices:["ウィルソン","ルーズベルト","トルーマン","リンカーン"],a:"ウィルソン"},
{sec:4,q:"この会議で結ばれた講和条約は？",choices:["ヴェルサイユ条約","南京条約","日英同盟","ポーツマス条約"],a:"ヴェルサイユ条約"},
{sec:4,q:"西園寺公望と共に派遣された人物は？",choices:["牧野伸顕","原敬","寺内正毅","山縣有朋"],a:"牧野伸顕"},
{sec:4,q:"1民族1国家の原則は？",choices:["民族自決","三権分立","立憲主義","民主主義"],a:"民族自決"},
{sec:4,q:"割譲された南洋諸島は○○以北。",choices:["赤道","北緯38度線","黄河","長江"],a:"赤道"},
{sec:4,q:"1920年発足の国際組織は？",choices:["国際連盟","国際連合","世界銀行","NATO"],a:"国際連盟"},

/* セクション5（25〜29） */
{sec:5,q:"国際連盟本部の都市は？",choices:["ジュネーブ","パリ","ロンドン","ワシントン"],a:"ジュネーブ"},
{sec:5,q:"国際連盟の常任理事国に含まれた国は？",choices:["日本","スペイン","ブラジル","オランダ"],a:"日本"},
{sec:5,q:"国際連盟事務局次長を務めた日本人は？",choices:["新渡戸稲造","福沢諭吉","吉野作造","大隈重信"],a:"新渡戸稲造"},
{sec:5,q:"1919年の中国の反日運動は？",choices:["五・四運動","辛亥革命","文化大革命","北伐"],a:"五・四運動"},
{sec:5,q:"同年の朝鮮の独立運動は？",choices:["三・一独立運動","甲午農民戦争","五・四運動","義兵運動"],a:"三・一独立運動"}
];

let currentSection,currentQuiz,index,score,timer,timeLeft;
let mistakes=[];

function startSection(sec){
  currentSection=sec;
  currentQuiz=quizData.filter(q=>q.sec===sec);
  index=0;
  score=0;
  mistakes=[];
  document.getElementById("menu").style.display="none";
  document.getElementById("result").innerHTML="";
  document.getElementById("quizBox").style.display="block";
  nextQuestion();
}

function nextQuestion(){
  if(index>=currentQuiz.length){ finishSection(); return; }

  document.getElementById("feedback").innerHTML="";
  const q=currentQuiz[index];
  document.getElementById("question").innerText=`Q${index+1}. ${q.q}`;

  let shuffled=[...q.choices].sort(()=>Math.random()-0.5);
  const div=document.getElementById("choices");
  div.innerHTML="";

  shuffled.forEach(choice=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.innerText=choice;
    btn.onclick=()=>answer(choice);
    div.appendChild(btn);
  });

  startTimer();
}

function startTimer(){
  timeLeft=10;
  document.getElementById("timer").innerText=`⏰ 残り${timeLeft}秒`;
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`⏰ 残り${timeLeft}秒`;
    if(timeLeft<=0){
      clearInterval(timer);
      answer("");
    }
  },1000);
}

function answer(choice){
  clearInterval(timer);
  const correct=currentQuiz[index].a;
  const buttons=document.querySelectorAll(".choice");
  const feedback=document.getElementById("feedback");

  buttons.forEach(btn=>{
    btn.disabled=true;
    if(btn.innerText===correct) btn.classList.add("correct");
    if(btn.innerText===choice && choice!==correct) btn.classList.add("wrong");
  });

  if(choice===correct){
    score++;
    feedback.innerHTML="⭕ 正解！";
    feedback.style.color="green";
  }else{
    mistakes.push({question:currentQuiz[index].q,correct:correct});
    feedback.innerHTML=`❌ 正解：${correct}`;
    feedback.style.color="red";
  }

  setTimeout(()=>{
    index++;
    nextQuestion();
  },1500);
}

function finishSection(){
  document.getElementById("quizBox").style.display="none";

  let html=`<h2>🎉 セクション終了 🎉</h2>`;
  html+=`<p>得点: ${score} / ${currentQuiz.length}</p>`;

  if(mistakes.length>0){
    html+="<h3>間違えた問題</h3>";
    mistakes.forEach(m=>{
      html+=`<p>問題: ${m.question}<br>正解: ${m.correct}</p>`;
    });
  }

  html+=`<button class="resultBtn" onclick="goMenu()">最初に戻る</button>`;
  if(currentSection<5){
    html+=`<button class="resultBtn" onclick="startSection(${currentSection+1})">次のセクションへ</button>`;
  }

  document.getElementById("result").innerHTML=html;
}

function goMenu(){
  document.getElementById("result").innerHTML="";
  document.getElementById("menu").style.display="block";
}
</script>
</body>
</html>
